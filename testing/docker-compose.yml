# ============================================================
# testing/docker-compose.yml - Entorno de pruebas NyxOS
# ============================================================
version: '3.8'

services:
  nyx-builder:
    build:
      context: ..
      dockerfile: testing/Dockerfile
    container_name: nyx-builder
    volumes:
      - ../iso:/nyx-os/iso
    command: ./tools/build.sh all
    
  nyx-test:
    image: nyx-test:latest
    container_name: nyx-test
    build:
      context: ..
      dockerfile: testing/Dockerfile.test
    volumes:
      - ../iso/NyxOS.iso:/iso/NyxOS.iso:ro
    devices:
      - /dev/kvm
    command: >
      qemu-system-x86_64
      -cdrom /iso/NyxOS.iso
      -m 2G -smp 2
      -enable-kvm -cpu host
      -nographic -serial mon:stdio
      
networks:
  default:
    driver: bridge